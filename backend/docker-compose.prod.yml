services:
  web:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery_worker:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery_beat:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    ports: []
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 192M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot_data:
  certbot_www:
